<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>BeePuzzle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">

    <!-- VK Bridge — @vkontakte/vk-bridge для общения с VK Mini Apps API.
         Грузится с CDN VK; альтернативно можно положить локально в TemplateData. -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
      #unity-container { width: 100%; height: 100%; position: absolute; }
      #unity-canvas { width: 100%; height: 100%; display: block; background: #231F20; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/VK_v1.0_20260716_1547.loader.js";
      var config = {
        dataUrl: buildUrl + "/VK_v1.0_20260716_1547.data.unityweb",
        frameworkUrl: buildUrl + "/VK_v1.0_20260716_1547.framework.js.unityweb",
        codeUrl: buildUrl + "/VK_v1.0_20260716_1547.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "BeePuzzle",
        productVersion: "1.0",
      };
      var canvas = document.querySelector("#unity-canvas");
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config).then(function () {
          console.log('[VK] Unity ready');
        }).catch(function (m) { alert(m); });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
